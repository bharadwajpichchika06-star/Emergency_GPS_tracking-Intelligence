{% extends "base.html" %}
{% block title %}Register — GPS Emergency Tracker{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:480px">
    <div class="logo">
      <div style="width:48px;height:48px;background:var(--accent);border-radius:0px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:#FFF"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path><path d="M2 12h20"></path></svg>
      </div>
    </div>
    <h2>Create your account</h2>
    <p class="subtitle">Start tracking and stay safe — it's free</p>
 
    <form method="POST" action="{{ url_for('register') }}" id="reg-form">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label" for="name">Full Name *</label>
          <input type="text" id="name" name="name" class="form-control"
                 placeholder="John Doe" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" class="form-control"
                 placeholder="+91 99999 00000" autocomplete="tel">
        </div>
      </div>
 
      <div class="form-group">
        <label class="form-label" for="email">Email Address *</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" required autocomplete="email">
      </div>
 
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label" for="password">Password *</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm *</label>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                 placeholder="Repeat password" required autocomplete="new-password">
        </div>
      </div>
 
      <div id="pw-match-msg" style="font-size:.78rem;margin-bottom:14px;display:none"></div>
 
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="reg-btn">
        Create Account
      </button>
    </form>

    <p style="text-align:center;font-size:.875rem;color:var(--text-secondary);margin-top:20px">
      Already have an account?
      <a href="{{ url_for('login') }}" style="color:var(--accent);font-weight:600">Sign in</a>
    </p>
  </div>
</div>

<script>
const pw  = document.getElementById("password");
const cpw = document.getElementById("confirm_password");
const msg = document.getElementById("pw-match-msg");

function checkMatch() {
  if (!cpw.value) { msg.style.display = "none"; return; }
  if (pw.value === cpw.value) {
    msg.style.display = "block";
    msg.style.color   = "var(--success)";
    msg.textContent   = "✅ Passwords match";
  } else {
    msg.style.display = "block";
    msg.style.color   = "var(--danger)";
    msg.textContent   = "❌ Passwords do not match";
  }
}
pw.addEventListener("input", checkMatch);
cpw.addEventListener("input", checkMatch);

document.getElementById("reg-form").addEventListener("submit", function(e) {
  if (pw.value !== cpw.value) {
    e.preventDefault();
    return;
  }
  const btn = document.getElementById("reg-btn");
  btn.innerHTML = '<span class="loader"></span> Creating account…';
  btn.disabled = true;
});
</script>
{% endblock %}
